            background-color: #000000;
            color: #ffffff;
            margin: 0;
            min-height: 100vh;

        /* Контейнер для наших колонок текста */
        .text-container {

            padding: 20px;   /* Отступ от краев экрана */

        /* Настройки для каждой отдельной колонки */
        .text-column {
            flex: 1;         /* Делает колонки одинаковыми по ширине */
        }
    </style>
</head>
